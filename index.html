<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- NAVIGATION -->
    <nav class="sticky top-0 bg-white shadow-md z-50 py-4 border-b-4 border-yellow-500">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="logo.png" alt="Logo" class="w-8 h-8 object-contain">
                <h1 class="text-xl font-black text-blue-900 uppercase">Ikuu Boys</h1>
            </div>
            <!-- Unified Navigation Links -->
            <div class="flex items-center gap-6 font-bold text-blue-900 uppercase text-[10px] sm:text-xs">
                <a href="index.html" class="hover:text-yellow-600">🏠 Home</a>
                <a href="ikuu-high.html" class="hover:text-yellow-600">School Profile</a>
                <a href="departments.html" class="hover:text-yellow-600">Departments</a>
                <a href="#gallery" class="hover:text-yellow-600">Gallery</a>
                <a href="portal.html" class="bg-yellow-500 px-3 py-1.5 rounded text-blue-950 hover:bg-yellow-400 flex items-center gap-1">

                </a>
            </div>
        </div>

        <h2 class="text-2xl font-black text-blue-900 mb-6">Campus Gallery</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <img src="ikuu gate.png" alt="Gate" class="rounded shadow w-full h-40 object-cover">
            <img src="bus.png" alt="Bus" class="rounded shadow w-full h-40 object-cover">
            <img src="students.png" alt="Students" class="rounded shadow w-full h-40 object-cover">
