<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ikuu Boys High School | Secure Portal</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://immjzkxwspkwmglcxpze.supabase.co',
            'sb_publishable_doDhQlSZzhYW_pb55Pc6rA_xx4A_AUo'
        );
    </script>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased">

    <div class="bg-blue-950 text-yellow-400 text-[11px] py-1.5 px-4 sticky top-0 z-50 border-b border-blue-900">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-1">
            <span>📍 P.O Box 40 – 60400, Chuka | 📧 ikuuboysh@yahoo.co.uk</span>
        </div>
    </div>

    <nav class="bg-[#1e3a8a] text-white shadow-md sticky top-7 z-40 py-2">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
            <h1 class="text-xl font-black uppercase">IKUU BOYS PORTAL</h1>
            <div class="flex items-center space-x-4 font-bold uppercase text-xs">
                <a href="index.html" class="hover:text-yellow-400">🏠 Home</a>
                <button id="logout-btn" onclick="logout()" class="hidden bg-red-600 px-3 py-1 rounded">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-10">
        
        <div id="auth-gateway" class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 border">
            <h2 class="text-xl font-extrabold text-center mb-6">Secure Portal Access</h2>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <select id="login-role" class="w-full p-3 bg-gray-50 border rounded-lg">
                    <option value="student">Student Portal</option>
                    <option value="teacher">Teacher Panel</option>
                    <option value="admin">Admin Panel</option>
                </select>
                <input type="text" id="login-id" placeholder="Admission / ID" required class="w-full p-3 bg-gray-50 border rounded-lg">
                <input type="password" id="login-pass" placeholder="Password" required class="w-full p-3 bg-gray-50 border rounded-lg">
                <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 rounded-lg">Access Account</button>
            </form>
        </div>

        <div id="student-dashboard" class="hidden space-y-8">
            <h2 class="text-3xl font-black">Welcome, <span id="student-user-name"></span></h2>
            <div id="student-results-list" class="space-y-4"></div>
        </div>

        <div id="teacher-dashboard" class="hidden space-y-8">
            <h2 class="text-3xl font-black text-emerald-800">Teacher Workspace</h2>
            <table class="w-full bg-white rounded-lg shadow p-4">
                <thead><tr class="text-left bg-gray-100"><th class="p-3">Name</th><th class="p-3">Admission No</th></tr></thead>
                <tbody id="teacher-student-table"></tbody>
            </table>
        </div>

        <div id="admin-dashboard" class="hidden space-y-8">
            <h2 class="text-3xl font-black text-red-800">Admin Control Terminal</h2>
            <table class="w-full bg-white rounded-lg shadow p-4">
                <tbody id="admin-user-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            const role = document.getElementById('login-role').value;

            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('admission_no', id)
                .eq('pass', pass)
                .eq('role', role)
                .single();

            if (data) {
                document.getElementById('auth-gateway').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                if (role === 'teacher') {
                    document.getElementById('teacher-dashboard').classList.remove('hidden');
                    renderTeacherWorkspace();
                } else if (role === 'student') {
                    document.getElementById('student-dashboard').classList.remove('hidden');
                    document.getElementById('student-user-name').textContent = data.name;
                } else if (role === 'admin') {
                    document.getElementById('admin-dashboard').classList.remove('hidden');
                    renderAdminTable();
                }
            } else {
                alert("Authentication failed.");
            }
        }

        async function renderTeacherWorkspace() {
            const { data: students } = await supabase.from('profiles').select('*').eq('role', 'student');
            document.getElementById('teacher-student-table').innerHTML = students.map(s => `
                <tr class="border-b"><td class="p-3">${s.name}</td><td class="p-3 font-mono">${s.admission_no}</td></tr>
            `).join('');
        }

        async function renderAdminTable() {
            const { data: users } = await supabase.from('profiles').select('*');
            document.getElementById('admin-user-table').innerHTML = users.map(u => `
                <tr class="border-b"><td class="p-3">${u.name}</td><td class="p-3">${u.role}</td></tr>
            `).join('');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
